
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Corridas - Inteligente</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #121212;
            color: white;
            padding: 20px;
            margin: 0;
        }
        video {
            width: 100%;
            max-width: 400px;
            border-radius: 8px;
            margin-top: 10px;
            background: #222;
        }
        button {
            background: #00c853;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 5px;
            font-weight: bold;
        }
        button.btn-excluir { background: #d32f2f; padding: 8px 12px; font-size: 14px; }
        button.btn-editar { background: #f57c00; padding: 8px 12px; font-size: 14px; }
        button.btn-arquivar-item { background: #757575; padding: 8px 12px; font-size: 14px; }
        
        .status {
            margin: 15px 0;
            color: #aaa;
            font-style: italic;
        }
        .container-lista {
            max-width: 500px;
            margin: 30px auto;
            text-align: left;
        }
        .item-corrida {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #00c853;
            transition: opacity 0.3s;
        }
        /* Classe para deixar o item fosco quando arquivado */
        .item-corrida.arquivado {
            opacity: 0.35;
            border-left: 5px solid #757575;
        }
        .dados-corrida { flex-grow: 1; }
        .dados-corrida p { margin: 5px 0; }
        .destaque { color: #00c853; font-weight: bold; }
        .acoes { display: flex; gap: 5px; flex-wrap: wrap; }

        /* Cores Dinâmicas de Ganhos */
        .cor-vermelha { color: #ff5252 !important; font-weight: bold; }
        .cor-amarela { color: #ffd740 !important; font-weight: bold; }
        .cor-verde { color: #69f0ae !important; font-weight: bold; }

        /* Estilo do Alerta Customizado no Meio da Tela */
        .modal-alerta {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-conteudo {
            background: #222;
            padding: 25px;
            border-radius: 12px;
            width: 85%;
            max-width: 350px;
            text-align: left;
            border: 2px solid #333;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .modal-conteudo h3 { margin-top: 0; text-align: center; color: #fff; border-bottom: 1px solid #333; padding-bottom: 10px;}
        .modal-conteudo p { margin: 12px 0; font-size: 15px; }
        .modal-botoes { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; }
        .modal-botoes button { flex: 1; margin: 0; padding: 12px; font-size: 14px; }
        .btn-modal-arquivar { background: #616161; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

    <h2>Scanner de Corridas 🚗</h2>
    
    <video id="video" autoplay playsinline></video>
    <br>
    <button id="btn-capturar">Bater Foto e Analisar</button>
    
    <canvas id="canvas" style="display:none;"></canvas>

    <p class="status">Status: <span id="status">Aguardando comando...</span></p>

    <div id="alerta-corrida" class="modal-alerta">
        <div class="modal-conteudo">
            <h3>Resultado do Scanner</h3>
            <p>Valor Bruto: <span id="lbl-valor" class="destaque">R$ 0,00</span></p>
            <p>Km Buscar: <span id="lbl-km-buscar">0.0 km</span></p>
            <p>Km Levar: <span id="lbl-km-levar">0.0 km</span></p>
            <p>Km Total: <span id="lbl-km-total" class="cor-vermelha">0.0 km</span></p>
            <p style="border-top: 1px dashed #444; padding-top: 10px;">
                R$ por Km: <span id="lbl-resultado-r-km">R$ 0,00/km</span>
            </p>
            <div class="modal-botoes">
                <button id="btn-modal-ok">OK (Salvar)</button>
                <button id="btn-modal-arquivar" class="btn-modal-arquivar">Arquivar</button>
            </div>
        </div>
    </div>

    <hr style="border: 1px solid #333; margin: 30px 0;">

    <div class="container-lista">
        <h3>Histórico de Corridas Salvas</h3>
        <div id="lista-corridas"></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btnCapturar = document.getElementById('btn-capturar');
        const statusText = document.getElementById('status');
        const listaCorridasDiv = document.getElementById('lista-corridas');

        // Elementos do Alerta Customizado
        const alertaCorrida = document.getElementById('alerta-corrida');
        const lblValor = document.getElementById('lbl-valor');
        const lblKmBuscar = document.getElementById('lbl-km-buscar');
        const lblKmLevar = document.getElementById('lbl-km-levar');
        const lblKmTotal = document.getElementById('lbl-km-total');
        const lblResultadoRKm = document.getElementById('lbl-resultado-r-km');
        const btnModalOk = document.getElementById('btn-modal-ok');
        const btnModalArquivar = document.getElementById('btn-modal-arquivar');

        let listaCorridas = [];
        let corridaAtualTemporaria = null; // Guarda os dados lidos antes de decidir salvar ou arquivar

        // Inicializa a câmera de forma flexível (Traseira no celular, padrão no PC)
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { 
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(stream => { video.srcObject = stream; })
                    .catch(e => { statusText.innerText = "Erro ao acessar câmera."; });
            });

        btnCapturar.addEventListener('click', () => {
            statusText.innerText = "Analisando imagem da foto...";
            
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imagemData = canvas.toDataURL('image/png');

            Tesseract.recognize(imagemData, 'por')
                .then(({ data: { text } }) => {
                    statusText.innerText = "Processado!";
                    processarDadosImagem(text);
                })
                .catch(err => {
                    console.error(err);
                    statusText.innerText = "Erro na leitura.";
                });
        });

        function processarDadosImagem(textoDoScanner) {
            // 1. Extração do Valor Financeiro (Ex: R$ 14,60)
            const regexValor = /R\$\s?(\d+[\.,]\d{2})/i;
            const matchValor = textoDoScanner.match(regexValor);
            let valorFloat = 0.0;
            let valorTexto = "R$ 0,00";

            if (matchValor) {
                valorTexto = matchValor[0];
                valorFloat = parseFloat(matchValor[1].replace(',', '.'));
            }

            // 2. Extração dos números de Km dentro dos parênteses (Ex: (9.7 km) e (2.7 km))
            // Essa regex captura especificamente o número que vem antes de "km" dentro de parênteses
            const regexParentesesKm = /\(\s*(\d+[\.,]\d+)\s*km\s*\)/gi;
            let valoresKmEncontrados = [];
            let match;
            
            while ((match = regexParentesesKm.exec(textoDoScanner)) !== null) {
                valoresKmEncontrados.push(parseFloat(match[1].replace(',', '.')));
            }

            // Mapeia os dois km de acordo com a ordem de leitura do app
            let kmBuscar = valoresKmEncontrados[0] || 0.0;
            let kmLevar = valoresKmEncontrados[1] || 0.0;
            let kmTotal = kmBuscar + kmLevar;

            // 3. Cálculo do valor por KM rodado total
            let rPorKm = kmTotal > 0 ? (valorFloat / kmTotal) : 0.0;

            // Salva no objeto temporário
            corridaAtualTemporaria = {
                valor: valorTexto,
                valorFloat: valorFloat,
                kmBuscar: kmBuscar.toFixed(1) + " km",
                kmLevar: kmLevar.toFixed(1) + " km",
                kmTotal: kmTotal.toFixed(1) + " km",
                rPorKm: rPorKm,
                arquivado: false
            };

            // 4. Alimenta o Alerta Customizado na Tela
            lblValor.innerText = corridaAtualTemporaria.valor;
            lblKmBuscar.innerText = corridaAtualTemporaria.kmBuscar;
            lblKmLevar.innerText = corridaAtualTemporaria.kmLevar;
            lblKmTotal.innerText = corridaAtualTemporaria.kmTotal; // Sempre fixo em vermelho conforme pedido
            
            lblResultadoRKm.innerText = `R$ ${rPorKm.toFixed(2)}/km`;

            // Aplica as cores dinâmicas com base nas regras do R$ por Km
            lblResultadoRKm.className = ""; // limpa classes antigas
            if (rPorKm < 1.40) {
                lblResultadoRKm.classList.add("cor-vermelha");
            } else if (rPorKm >= 1.40 && rPorKm <= 1.90) {
                lblResultadoRKm.classList.add("cor-amarela");
            } else {
                lblResultadoRKm.classList.add("cor-verde");
            }

            // Abre o alerta na tela
            alertaCorrida.style.display = "flex";
        }

        // Ação do Botão OK (Salvar Normal)
        btnModalOk.addEventListener('click', () => {
            if (corridaAtualTemporaria) {
                corridaAtualTemporaria.id = Date.now();
                corridaAtualTemporaria.arquivado = false;
                listaCorridas.push(corridaAtualTemporaria);
                renderizarLista();
            }
            alertaCorrida.style.display = "none";
        });

        // Ação do Botão Arquivar do Alerta
        btnModalArquivar.addEventListener('click', () => {
            if (corridaAtualTemporaria) {
                corridaAtualTemporaria.id = Date.now();
                corridaAtualTemporaria.arquivado = true; // Define o estado como arquivado
                listaCorridas.push(corridaAtualTemporaria);
                renderizarLista();
            }
            alertaCorrida.style.display = "none";
        });

        function renderizarLista() {
            listaCorridasDiv.innerHTML = "";

            if (listaCorridas.length === 0) {
                listaCorridasDiv.innerHTML = "<p style='color: #666;'>Nenhuma corrida salva ainda.</p>";
                return;
            }

            listaCorridas.forEach(corrida => {
                const itemDiv = document.createElement('div');
                // Adiciona a classe 'arquivado' para aplicar o efeito fosco no CSS se necessário
                itemDiv.className = `item-corrida ${corrida.arquivado ? 'arquivado' : ''}`;
                
                // Determina a cor do R$/km para exibir no histórico também
                let classeCorHistorico = "cor-verde";
                if (corrida.rPorKm < 1.40) classeCorHistorico = "cor-vermelha";
                else if (corrida.rPorKm >= 1.40 && corrida.rPorKm <= 1.90) classeCorHistorico = "cor-amarela";

                itemDiv.innerHTML = `
                    <div class="dados-corrida">
                        <p>Valor: <span class="destaque">${corrida.valor}</span></p>
                        <p>Buscar: <span>${corrida.kmBuscar}</span> | Levar: <span>${corrida.kmLevar}</span></p>
                        <p>Total: <span class="cor-vermelha">${corrida.kmTotal}</span></p>
                        <p>Ganho/Km: <span class="${classeCorHistorico}">R$ ${corrida.rPorKm.toFixed(2)}/km</span></p>
                    </div>
                    <div class="acoes">
                        <button class="btn-arquivar-item" onclick="alternarArquivar(${corrida.id})">
                            ${corrida.arquivado ? 'Desarquivar' : 'Arquivar'}
                        </button>
                        <button class="btn-editar" onclick="editarCorrida(${corrida.id})">Editar</button>
                        <button class="btn-excluir" onclick="excluirCorrida(${corrida.id})">Excluir</button>
                    </div>
                `;
                listaCorridasDiv.appendChild(itemDiv);
            });
        }

        function alternarArquivar(id) {
            const corrida = listaCorridas.find(c => c.id === id);
            if (corrida) {
                corrida.arquivado = !corrida.arquivado;
                renderizarLista();
            }
        }

        function excluirCorrida(id) {
            if (confirm("Deseja excluir esta corrida?")) {
                listaCorridas = listaCorridas.filter(corrida => corrida.id !== id);
                renderizarLista();
            }
        }

        function editarCorrida(id) {
            const corrida = listaCorridas.find(c => c.id === id);
            if (corrida) {
                const novoValor = prompt("Edite o Valor:", corrida.valor);
                if (novoValor !== null) {
                    corrida.valor = novoValor;
                    renderizarLista();
                }
            }
        }
    </script>
</body>
</html>
