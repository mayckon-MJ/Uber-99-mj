<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Corridas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #121212;
            color: white;
            padding: 20px;
            margin: 0;
        }
        video {
            width: 100%;
            max-width: 400px;
            border-radius: 8px;
            margin-top: 10px;
            background: #222;
        }
        button {
            background: #00c853;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 5px;
            font-weight: bold;
        }
        button.btn-excluir {
            background: #d32f2f;
            padding: 8px 12px;
            font-size: 14px;
        }
        button.btn-editar {
            background: #f57c00;
            padding: 8px 12px;
            font-size: 14px;
        }
        .status {
            margin: 15px 0;
            color: #aaa;
            font-style: italic;
        }
        .container-lista {
            max-width: 500px;
            margin: 30px auto;
            text-align: left;
        }
        .item-corrida {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #00c853;
        }
        .dados-corrida {
            flex-grow: 1;
        }
        .dados-corrida p {
            margin: 5px 0;
        }
        .destaque {
            color: #00c853;
            font-weight: bold;
        }
        .acoes {
            display: flex;
            gap: 5px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

    <h2>Scanner de Corridas 🚗</h2>
    
    <video id="video" autoplay playsinline></video>
    <br>
    <button id="btn-capturar">Bater Foto e Salvar</button>
    
    <canvas id="canvas" style="display:none;"></canvas>

    <p class="status">Status: <span id="status">Aguardando comando...</span></p>

    <hr style="border: 1px solid #333; margin: 30px 0;">

    <div class="container-lista">
        <h3>Histórico de Corridas Salvas</h3>
        <div id="lista-corridas">
            </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btnCapturar = document.getElementById('btn-capturar');
        const statusText = document.getElementById('status');
        const listaCorridasDiv = document.getElementById('lista-corridas');

        // Array para armazenar as corridas na memória
        let listaCorridas = [];

        // 1. Inicializa a câmera com a configuração padrão do navegador
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { 
                video.srcObject = stream; 
            })
            .catch(err => { 
                console.error("Erro ao acessar a câmera: ", err); 
                statusText.innerText = "Erro ao acessar a câmera."; 
            });

        // 2. Evento do botão para bater foto e rodar o OCR
        btnCapturar.addEventListener('click', () => {
            statusText.innerText = "Analisando imagem da foto...";
            
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imagemData = canvas.toDataURL('image/png');

            // Executa o leitor OCR em português
            Tesseract.recognize(imagemData, 'por')
                .then(({ data: { text } }) => {
                    statusText.innerText = "Texto processado com sucesso!";
                    processarEAdicionarNaLista(text);
                })
                .catch(err => {
                    console.error(err);
                    statusText.innerText = "Erro ao ler dados da imagem.";
                });
        });

        // 3. Captura o Valor e o Km usando Expressões Regulares (Regex)
        function processarEAdicionarNaLista(textoDoScanner) {
            // Procura por formatos como R$ 6,20 ou R$6.20
            const regexValor = /R\$\s?\d+[\.,]\d{2}/i;
            // Procura por formatos como 1.20km ou 1,20 km
            const regexKm = /\d+[\.,]\d+\s?km/i;

            const resultadoValor = textoDoScanner.match(regexValor);
            const resultadoKm = textoDoScanner.match(regexKm);

            // Se não encontrar nada, define um valor padrão para não quebrar o sistema
            const valorFinal = resultadoValor ? resultadoValor[0] : "R$ 0,00";
            const kmFinal = resultadoKm ? resultadoKm[0] : "0.00 km";

            // Cria o objeto da nova corrida
            const novaCorrida = {
                id: Date.now(), // Gera um ID único baseado no tempo atual
                valor: valorFinal,
                km: kmFinal
            };

            // Adiciona no array e atualiza a interface
            listaCorridas.push(novaCorrida);
            renderizarLista();
        }

        // 4. Desenha a lista de corridas na tela com os botões de ação
        function renderizarLista() {
            listaCorridasDiv.innerHTML = ""; // Limpa a lista antiga

            if (listaCorridas.length === 0) {
                listaCorridasDiv.innerHTML = "<p style='color: #666;'>Nenhuma corrida salva ainda.</p>";
                return;
            }

            listaCorridas.forEach(corrida => {
                // Cria a estrutura HTML para cada linha de corrida
                const itemDiv = document.createElement('div');
                itemDiv.className = 'item-corrida';
                itemDiv.innerHTML = `
                    <div class="dados-corrida">
                        <p>Valor: <span class="destaque">${corrida.valor}</span></p>
                        <p>Distância: <span class="destaque">${corrida.km}</span></p>
                    </div>
                    <div class="acoes">
                        <button class="btn-editar" onclick="editarCorrida(${corrida.id})">Editar</button>
                        <button class="btn-excluir" onclick="excluirCorrida(${corrida.id})">Excluir</button>
                    </div>
                `;
                listaCorridasDiv.appendChild(itemDiv);
            });
        }

        // 5. Função para excluir uma corrida da lista
        function excluirCorrida(id) {
            if (confirm("Tem certeza que deseja excluir esta corrida?")) {
                listaCorridas = listaCorridas.filter(corrida => corrida.id !== id);
                renderizarLista();
            }
        }

        // 6. Função para editar os valores de uma corrida manualmente
        function editarCorrida(id) {
            const corrida = listaCorridas.find(c => c.id === id);
            if (corrida) {
                const novoValor = prompt("Edite o Valor da corrida:", corrida.valor);
                const novoKm = prompt("Edite a quilometragem (Km):", corrida.km);

                // Se o usuário não cancelar as caixas de texto, atualiza os dados
                if (novoValor !== null && novoKm !== null) {
                    corrida.valor = novoValor;
                    corrida.km = novoKm;
                    renderizarLista();
                }
            }
        }
    </script>
</body>
</html>
